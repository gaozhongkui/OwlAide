<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OwlAide iOS Prototype</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#f0f2f5;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
    .proto-wrap{display:flex;gap:20px;padding:2rem;overflow-x:auto;align-items:flex-start}
    .phone{width:320px;flex-shrink:0;background:#fff;border-radius:44px;box-shadow:0 0 0 10px #1a1a1a,0 24px 48px rgba(0,0,0,.25);overflow:hidden;position:relative}
    .phone-inner{height:680px;overflow:hidden;position:relative;background:#f5f7fa;display:flex;flex-direction:column}
    .status-bar{height:44px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 24px 8px;font-size:12px;font-weight:600;color:#111}

    /* Screen selector */
    .screen-tabs{display:flex;gap:8px;padding:1rem 2rem;overflow-x:auto}
    .stab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid #ddd;color:#555;background:#fff;transition:all .15s;white-space:nowrap}
    .stab.active{background:#1B8A7E;color:#fff;border-color:#1B8A7E}

    /* Screens */
    .screen{display:none;height:100%;flex-direction:column;overflow:hidden}
    .screen.active{display:flex}

    /* Colors */
    :root{--teal:#1B8A7E;--teal-light:#E8F5F3;--teal-mid:#5BB8AD;--warm:#FF7043;--warm-light:#FFF3EF;--text:#1a1a1a;--sub:#666;--bg:#f5f7fa;--card:#fff;--border:#eee}

    /* Home screen */
    .home-header{background:linear-gradient(160deg,#1B8A7E,#2AA99B);padding:24px 20px 28px;color:#fff}
    .home-greeting{font-size:14px;opacity:.85;margin-bottom:4px}
    .home-name{font-size:24px;font-weight:700}
    .home-sub{font-size:13px;opacity:.75;margin-top:4px}
    .home-body{flex:1;padding:16px;overflow-y:auto}
    .next-visit{background:#fff;border-radius:16px;padding:16px;margin-bottom:14px;border:1.5px solid #E8F5F3}
    .next-label{font-size:11px;color:#1B8A7E;font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px}
    .next-date{font-size:20px;font-weight:700;color:#1a1a1a}
    .next-dept{font-size:14px;color:#666;margin-top:2px}
    .next-actions{display:flex;gap:8px;margin-top:12px}
    .btn-sm{flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:600;text-align:center;cursor:pointer}
    .btn-primary{background:#1B8A7E;color:#fff}
    .btn-outline{background:#E8F5F3;color:#1B8A7E}
    .section-title{font-size:13px;font-weight:600;color:#888;margin:16px 0 10px}
    .quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
    .quick-card{background:#fff;border-radius:14px;padding:14px;cursor:pointer;border:1.5px solid #f0f0f0}
    .quick-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:8px}
    .quick-title{font-size:14px;font-weight:600;color:#1a1a1a}
    .quick-desc{font-size:11px;color:#888;margin-top:2px}
    .history-item{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
    .hist-dot{width:10px;height:10px;border-radius:50%;background:#1B8A7E;flex-shrink:0}
    .hist-info{flex:1}
    .hist-date{font-size:12px;color:#888}
    .hist-title{font-size:14px;font-weight:600;color:#1a1a1a}

    /* Prepare screen */
    .prep-header{background:#1B8A7E;padding:20px;color:#fff}
    .prep-title{font-size:20px;font-weight:700}
    .prep-sub{font-size:13px;opacity:.8;margin-top:4px}
    .prep-body{flex:1;padding:16px;overflow-y:auto}
    .prep-step{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px}
    .step-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
    .step-num{width:28px;height:28px;border-radius:8px;background:#1B8A7E;color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .step-label{font-size:15px;font-weight:600;color:#1a1a1a}
    .voice-btn{width:100%;padding:14px;border-radius:12px;background:#E8F5F3;border:none;color:#1B8A7E;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer}
    .symptom-chip{display:inline-flex;align-items:center;background:#E8F5F3;color:#1B8A7E;padding:6px 10px;border-radius:20px;font-size:13px;margin:3px;gap:4px}

    /* Summary screen */
    .sum-header{background:#1B8A7E;padding:20px;color:#fff}
    .sum-title{font-size:20px;font-weight:700}
    .sum-body{flex:1;padding:16px;overflow-y:auto}
    .sum-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px}
    .sum-card-title{display:flex;align-items:center;gap:8px;margin-bottom:12px}
    .sum-card-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
    .sum-card-label{font-size:14px;font-weight:700;color:#1a1a1a}
    .sum-item{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid #f8f8f8;align-items:flex-start}
    .sum-dot{width:6px;height:6px;border-radius:50%;background:#1B8A7E;flex-shrink:0;margin-top:7px}
    .sum-text{font-size:14px;color:#333;line-height:1.5}
    .sum-highlight{background:#FFF8E1;border-radius:10px;padding:12px;margin-bottom:12px;display:flex;gap:10px;align-items:flex-start}
    .sum-warn-text{font-size:13px;color:#795548;line-height:1.6}
    .share-row{padding:16px;display:flex;gap:12px;background:#fff;border-top:1px solid #eee}

    /* Tab bar */
    .tab-bar{height:80px;background:#fff;border-top:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-around;padding-bottom:16px}
    .tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;color:#ccc}
    .tab-item.active{color:#1B8A7E}
    .tab-label{font-size:10px;font-weight:500}
    </style>
</head>
<body>

<div class="screen-tabs">
  <div class="stab active" onclick="showScreen('home',this)">首页</div>
  <div class="stab" onclick="showScreen('prepare',this)">准备问诊</div>
  <div class="stab" onclick="showScreen('record',this)">就诊录音</div>
  <div class="stab" onclick="showScreen('summary',this)">AI 摘要</div>
</div>

<div class="proto-wrap">
<div class="phone">
<div class="phone-inner">
  <div class="status-bar"><span>9:41</span><span>●●●</span></div>

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="home-header">
      <div class="home-greeting">早上好</div>
      <div class="home-name">李奶奶</div>
      <div class="home-sub">今天是 6月29日 星期一</div>
    </div>
    <div class="home-body">
      <div class="next-visit">
        <div class="next-label">下次就诊</div>
        <div class="next-date">7月3日 上午9:00</div>
        <div class="next-dept">心内科 · 协和医院</div>
        <div class="next-actions">
          <div class="btn-sm btn-primary">准备问诊</div>
          <div class="btn-sm btn-outline">取消提醒</div>
        </div>
      </div>
      <div class="section-title">快捷功能</div>
      <div class="quick-grid">
        <div class="quick-card"><div class="quick-icon" style="background:#E8F5F3;color:#1B8A7E"><i class="ti ti-microphone"></i></div><div class="quick-title">开始录音</div></div>
        <div class="quick-card"><div class="quick-icon" style="background:#FFF3EF;color:#FF7043"><i class="ti ti-clipboard"></i></div><div class="quick-title">准备问诊</div></div>
      </div>
    </div>
    <div class="tab-bar">
      <div class="tab-item active"><i class="ti ti-home"></i><span class="tab-label">首页</span></div>
      <div class="tab-item"><i class="ti ti-calendar"></i><span class="tab-label">就诊</span></div>
      <div class="tab-item"><i class="ti ti-pill"></i><span class="tab-label">用药</span></div>
    </div>
  </div>

  <!-- SUMMARY -->
  <div class="screen" id="screen-summary">
    <div class="sum-header">
      <div class="sum-title">就诊摘要</div>
    </div>
    <div class="sum-body">
      <div class="sum-highlight">
        <div class="sum-warn-text">医生叮嘱：<strong>两周内避免爬楼梯</strong>，如膝盖红肿请立即就诊</div>
      </div>
      <div class="sum-card">
        <div class="sum-card-title">
          <div class="sum-card-icon" style="background:#E8F5F3;color:#1B8A7E"><i class="ti ti-stethoscope"></i></div>
          <div class="sum-card-label">诊断结论</div>
        </div>
        <div class="sum-item"><div class="sum-dot"></div><div class="sum-text">右膝关节炎，轻度磨损</div></div>
      </div>
      <div class="sum-card">
        <div class="sum-card-title">
          <div class="sum-card-icon" style="background:#F3E8FF;color:#7C3AED"><i class="ti ti-calendar"></i></div>
          <div class="sum-card-label">复诊安排</div>
        </div>
        <div class="sum-item"><div class="sum-dot" style="background:#7C3AED"></div><div class="sum-text">一个月后复查（7月15日前）</div></div>
        <div class="sum-item"><div class="sum-dot" style="background:#7C3AED"></div><div class="sum-text">届时请带上此次检查报告对比</div></div>
      </div>
    </div>
    <div class="share-row">
      <div class="btn-sm btn-primary" style="padding:14px">发给子女</div>
      <div class="btn-sm btn-outline" style="padding:14px">保存本地</div>
    </div>
  </div>

</div>
</div>
</div>

<script>
function showScreen(id, el) {
  document.querySelectorAll('.stab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}
</script>
</body>
</html>
